<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing Detail — AfghanShop</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="listing.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

<div class="topbar">
  <div class="container topbar-inner">
    <div class="topbar-left"><a href="index.html"><i class="fas fa-home"></i> Home</a></div>
    <div class="topbar-right">
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
      <a href="register.html" class="btn-register"><i class="fas fa-user-plus"></i> Register</a>
    </div>
  </div>
</div>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <span class="logo-afghan">Afghan</span><span class="logo-shop">Shop</span><span class="logo-dot">.com</span>
    </a>
    <div class="search-bar">
      <input type="text" placeholder="Search listings..." class="search-input" id="searchInput" />
      <button class="search-btn" onclick="window.location.href='listings.html?q='+encodeURIComponent(document.getElementById('searchInput').value)"><i class="fas fa-search"></i> Search</button>
    </div>
    <a href="index.html" class="btn-post-ad"><i class="fas fa-plus-circle"></i> Post Free Ad</a>
  </div>
</header>

<div class="listing-detail-page">
  <div class="container">
    <div class="breadcrumb" id="detailBreadcrumb">
      <a href="index.html">Home</a> <i class="fas fa-chevron-right"></i>
      <a href="listings.html">Listings</a> <i class="fas fa-chevron-right"></i>
      <span id="detailCat">—</span>
    </div>

    <div class="detail-grid" id="detailGrid">
      <!-- Populated by JS -->
    </div>

    <section class="related-section">
      <div class="section-header">
        <h2><i class="fas fa-th"></i> Similar Listings</h2>
        <a href="listings.html" class="see-all">See All →</a>
      </div>
      <div class="listings-grid" id="relatedGrid"></div>
    </section>
  </div>
</div>

<footer class="footer">
  <div class="footer-bottom" style="border-top:none;">
    <div class="container">
      <p>© 2026 AfghanShop.com — All Rights Reserved</p>
    </div>
  </div>
</footer>

<div class="toast" id="globalToast"></div>
<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

<script src="app.js"></script>
<script src="listing.js"></script>
</body>
</html>
